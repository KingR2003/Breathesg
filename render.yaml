services:
  - type: web
    name: breathe-esg-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py seed_demo && gunicorn breatheesg.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://breathesg.vercel.app"
    healthCheckPath: /api/auth/me/

databases:
  - name: breathe-esg-db
    databaseName: breatheesg
    user: breatheesg
    plan: free
